services:
  postgres:
    image: postgres:16
    container_name: capsuliki-postgres
    environment:
      POSTGRES_DB: capsuliki
      POSTGRES_USER: capsuliki
      POSTGRES_PASSWORD: capsuliki
    ports:
      - "5432:5432"
    volumes:
      - capsuliki_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capsuliki -d capsuliki"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: capsuliki-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - capsuliki_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  capsuliki_pg_data:
  capsuliki_redis_data:
