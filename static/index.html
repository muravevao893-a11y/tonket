<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Капсулики</title>
  <style>
    body{margin:0;font-family:Inter,system-ui,Arial;background:#071222;color:#f4f7fb;display:grid;place-items:center;min-height:100vh}
    main{max-width:760px;padding:32px}
    .card{background:linear-gradient(180deg,#11243d,#0b1728);border:1px solid #213a5f;border-radius:28px;padding:28px;box-shadow:0 20px 80px #0008}
    h1{font-size:42px;margin:0 0 10px}
    p{color:#b9c7dd;line-height:1.6}
    .pill{display:inline-block;background:#f7c948;color:#111;padding:8px 12px;border-radius:999px;font-weight:700}
  </style>
</head>
<body>
<main>
  <div class="card">
    <span class="pill">Telegram game bot</span>
    <h1>🎁 Капсулики</h1>
    <p>Открывай капсулы, собирай питомцев, отправляй их в экспедиции, меняйся с друзьями и лови редких существ в группах.</p>
  </div>
</main>
</body>
</html>
