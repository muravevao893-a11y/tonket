<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f13" />
    <meta name="color-scheme" content="dark" />
    <title>TONKET</title>
    <script>
      window.__TONKET_BOOT_STAGE__ = 'html_loaded';
      window.__TONKET_BOOT_ERROR__ = null;
      window.__TONKET_SHOW_FATAL__ = function(message, detail) {
        window.__TONKET_BOOT_ERROR__ = { message: String(message || 'Unknown error'), detail: String(detail || '') };
        var root = document.getElementById('root');
        if (!root) return;
        root.innerHTML = '<main style="min-height:100dvh;background:#0f0f13;color:#f8fafc;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;padding:18px;box-sizing:border-box">' +
          '<section style="max-width:430px;margin:0 auto;border:1px solid rgba(239,68,68,.28);background:rgba(239,68,68,.10);border-radius:28px;padding:18px;box-shadow:0 24px 80px rgba(0,0,0,.38)">' +
          '<div style="font-size:42px">🧯</div>' +
          '<h1 style="margin:14px 0 8px;font-size:22px;line-height:1.15">TONKET frontend did not start</h1>' +
          '<p style="margin:0;color:rgba(254,226,226,.86);font-size:14px;line-height:1.55">JS bundle crashed before React could render. This screen is shown by the HTML bootloader, so now it is not a silent gray screen.</p>' +
          '<pre style="margin-top:14px;white-space:pre-wrap;word-break:break-word;border:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.30);border-radius:16px;padding:12px;font-size:12px;line-height:1.45;color:#fff">' + String(message || 'Unknown error').replace(/[<>&]/g, function(c){return ({"<":"&lt;",">":"&gt;","&":"&amp;"})[c]}) + '\n\n' + String(detail || '').replace(/[<>&]/g, function(c){return ({"<":"&lt;",">":"&gt;","&":"&amp;"})[c]}) + '</pre>' +
          '<button onclick="location.reload()" style="margin-top:14px;width:100%;border:0;background:#2563eb;color:white;font-weight:900;border-radius:16px;padding:13px 16px">Reload</button>' +
          '</section></main>';
      };
      window.addEventListener('error', function(event) {
        window.__TONKET_SHOW_FATAL__(event.message || 'window error', event.filename ? (event.filename + ':' + event.lineno + ':' + event.colno) : '');
      });
      window.addEventListener('unhandledrejection', function(event) {
        var reason = event.reason;
        window.__TONKET_SHOW_FATAL__('Unhandled promise rejection', reason && reason.stack ? reason.stack : (reason && reason.message ? reason.message : String(reason)));
      });
      window.setTimeout(function(){
        if (!window.__TONKET_REACT_MOUNTED__) {
          var status = document.getElementById('tonket-boot-status');
          if (status) status.textContent = 'Still waiting for JS bundle… If this stays here, Telegram/Railway did not load the React bundle.';
        }
      }, 4000);
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="root">
      <main style="min-height:100dvh;background:#0f0f13;color:#f8fafc;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;padding:18px;box-sizing:border-box">
        <section style="max-width:430px;margin:0 auto;border:1px solid rgba(255,255,255,.08);background:#111827;border-radius:28px;padding:18px;box-shadow:0 24px 80px rgba(0,0,0,.32)">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="width:42px;height:42px;border-radius:18px;background:#0098ea;display:grid;place-items:center;font-size:22px">🚀</div>
            <div>
              <h1 style="margin:0;font-size:20px;line-height:1.15">TONKET</h1>
              <p id="tonket-boot-status" style="margin:4px 0 0;color:#94a3b8;font-size:13px">Loading React bundle…</p>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" crossorigin src="/assets/index-BXGRx4h6.js" onerror="window.__TONKET_SHOW_FATAL__ && window.__TONKET_SHOW_FATAL__('React bundle failed to load', this.src)"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Bct_DrTm.css">
  </body>
</html>
